pubchem_csv : './data/PubChem_compound_smarts_[_]~[B](~[_])(~[_])~[_].csv'
dft_csv : './data/result_voltage.csv'
data_path : './data/data.csv'
seed: 42
train_test_ratio : 0.4

descriptors:
  _get: # descriptor = mol.GetName()
  - 'NumAtoms'
  - 'NumHeavyAtoms'
  _2d: # descriptor = Descriptors.Name(mol)
  - 'NumHeteroatoms'
  - 'NumRotatableBonds'
  - 'NumHAcceptors'
  - 'MolWt'
  - 'HeavyAtomMolWt'
  - 'TPSA'
  - 'MolLogP'
  - 'MolMR'
  - 'NumValenceElectrons'
  - 'MaxPartialCharge'
  - 'MinPartialCharge'
  - 'FpDensityMorgan1'
  - 'FpDensityMorgan2'
  - 'FpDensityMorgan3'
  - 'MaxEStateIndex'
  - 'MinEStateIndex'
  _3d: # descriptor = Descriptors3D.Name(mol)
  - 'Asphericity'
  - 'Eccentricity'
  - 'NPR1'
  - 'NPR2'
  - 'PMI1'
  - 'PMI2'
  - 'PMI3'
  - 'RadiusOfGyration'
  - 'SpherocityIndex'
  - 'InertialShapeFactor'
  - 'PBF'
  _diy:
   - 'FractionCSP2'
   - 'NegativecenterType'
   - 'EDGRatioNegCenter'
   - 'EWGRatioNegCenter'
   - 'C_ratio'
   - 'H_ratio'
   - 'O_ratio'
   - 'N_ratio'
   - 'F_ratio'
   - 'S_ratio'
   - 'B_ratio'
  #  - 'Si_ratio'
  #  - 'Se_ratio'
   - 'P_ratio'